# K8s RBAC 配置 - ServiceAccount 最小权限原则

# 1. 创建专用 ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: release-platform-sa
  namespace: kube-system
---
# 2. 创建 ClusterRole (最小权限)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: release-platform-role
rules:
  # Deployment 管理权限
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  
  # StatefulSet 管理权限
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  
  # Pod 只读权限 (用于查看状态)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Pod 日志权限 (用于查看日志)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  
  # ReplicaSet 只读权限
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  
  # Event 只读权限
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  
  # Namespace 只读权限
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
# 3. 绑定 ClusterRole 到 ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: release-platform-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: release-platform-role
subjects:
  - kind: ServiceAccount
    name: release-platform-sa
    namespace: kube-system
---
# 4. 创建长期 Token Secret (Kubernetes 1.24+)
apiVersion: v1
kind: Secret
metadata:
  name: release-platform-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: release-platform-sa
type: kubernetes.io/service-account-token
